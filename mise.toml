[tools]
gleam = "1.15.2"
python = "3.14.4"

[tasks.help]
description = "display help"
run = '''cat << EOF
To run this project, you need to install the dependencies:

1. install mise 

See https://mise.jdx.dev for install instructions, but generally, brew should work:

	> brew install mise
	> mise --help

2. clone the surtoget repository and cd into it

3. examine the available tasks

	> mise tasks

4. the common useage is

	> mise run

5. the detailed useage is

	> mise help 	// displays this message
	> mise tasks 	// displays the tasks in this mise.toml file
	> mise css	// generate the tailwind css
	> mise images	// pre-fetch and resize news article images (build artifact)
	> mise format	// gleam format's this projects gleam source code
	> mise run	// gleam run's this project

That said, 'mise run' is what you will run most of the time.

EOF
'''

[tasks.css]
description = "generate css"
run = "gleam run -m tailwind/install && gleam run -m tailwind/run && gzip -k -f ./priv/css/tailwind.css"
sources = ["src"]
outputs = ["priv/css"]

[tasks.images]
description = "pre-fetch and resize news article images into priv/static/news_images/"
run = [
  "pip install --quiet Pillow",
  "python3 scripts/fetch_news_images.py",
]
sources = ["src/news.gleam", "scripts/fetch_news_images.py"]
outputs = ["priv/static/news_images"]

[tasks.format]
description = "gleam format"
run = "gleam format"

[tasks.run]
description = "gleam run"
depends = ["format", "css", "images"]
run = "gleam run"

[tasks.test-snapshots]
description = "run Playwright snapshot tests in Docker"
run = "docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from playwright"

[tasks.update-snapshots]
description = "update Playwright baseline snapshots"
run = "docker compose -f docker-compose.test.yml run playwright --update-snapshots"
