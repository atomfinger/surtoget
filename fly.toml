# fly.toml app configuration file generated for surtoget on 2025-07-17T19:33:04+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'surtoget'
primary_region = 'arn'

[build]

[env]
  # Disable libvips operation cache - it defaults to ~100MB outside the BEAM heap
  VIPS_CACHE_MAX = "0"
  VIPS_CACHE_MAX_MEM = "0"
  VIPS_CACHE_MAX_FILES = "0"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = 'suspend'
auto_start_machines = true
min_machines_running = 1
processes = ['app']



[[vm]]
memory = '512mb'
cpu_kind = 'shared'
cpus = 1
